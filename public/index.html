<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qwen AI Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-100 flex flex-col h-screen">
    <header class="bg-white shadow p-4 text-center">
        <h1 class="text-2xl font-bold text-gray-800">Qwen AI Chat (qwen3.6-plus)</h1>
    </header>

    <main class="flex-grow p-4 overflow-y-auto w-full max-w-3xl mx-auto" id="chat-container">
        <div id="messages" class="space-y-4">
            <!-- Messages will be injected here -->
        </div>
    </main>

    <footer class="bg-white border-t p-4 w-full max-w-3xl mx-auto">
        <form id="chat-form" class="flex space-x-2">
            <input type="text" id="message-input" class="flex-grow border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Type your message..." required autocomplete="off">
            <button type="submit" class="bg-blue-600 text-white rounded-lg px-6 py-2 font-semibold hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 flex items-center justify-center min-w-[100px]">
                <span id="send-text">Send</span>
                <div id="loading-spinner" class="loader hidden ml-2 border-t-white"></div>
            </button>
        </form>
    </footer>

    <script src="/app.js"></script>
</body>
</html>
