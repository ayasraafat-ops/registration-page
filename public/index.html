<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع ذكاء اصطناعي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar for better appearance */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        /* Pre-wrap for formatting text correctly */
        .message-content {
            white-space: pre-wrap;
            word-break: break-word;
        }
    </style>
</head>
<body class="bg-gray-100 h-screen flex flex-col font-sans">

    <!-- Header -->
    <header class="bg-blue-600 text-white p-4 shadow-md text-center">
        <h1 class="text-2xl font-bold">مساعد الذكاء الاصطناعي (Qwen)</h1>
    </header>

    <!-- Chat Area -->
    <main class="flex-1 overflow-y-auto p-4 flex flex-col gap-4 w-full max-w-4xl mx-auto" id="chat-container">
        <!-- Messages will be injected here by script.js -->
        <div class="flex justify-start w-full">
            <div class="bg-white text-gray-800 rounded-lg p-3 max-w-[80%] shadow-sm border border-gray-200">
                <p class="message-content text-sm sm:text-base">مرحباً! كيف يمكنني مساعدتك اليوم؟</p>
            </div>
        </div>
    </main>

    <!-- Input Area -->
    <footer class="bg-white border-t border-gray-300 p-4 shadow-md w-full">
        <div class="max-w-4xl mx-auto flex gap-2">
            <input type="text" id="user-input" class="flex-1 border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all" placeholder="اكتب رسالتك هنا..." />
            <button id="send-button" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">إرسال</button>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
