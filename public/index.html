<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق الذكاء الاصطناعي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar for better appearance */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-blue-600 text-white p-4 shadow-md text-center">
        <h1 class="text-2xl font-bold">مساعد الذكاء الاصطناعي (Qwen 3.6 Plus)</h1>
    </header>

    <!-- Chat Container -->
    <main class="flex-1 overflow-hidden flex flex-col max-w-4xl w-full mx-auto p-4 bg-white shadow-lg mt-4 mb-4 rounded-lg">

        <!-- Messages Area -->
        <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-4">
            <!-- Initial Assistant Message -->
            <div class="flex justify-start">
                <div class="bg-blue-100 text-blue-900 rounded-lg p-3 max-w-[80%] whitespace-pre-wrap">أهلاً بك! كيف يمكنني مساعدتك اليوم؟</div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="mt-4 border-t pt-4">
            <form id="chat-form" class="flex gap-2">
                <input
                    type="text"
                    id="user-input"
                    class="flex-1 border rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
                    placeholder="اكتب رسالتك هنا..."
                    required
                >
                <button
                    type="submit"
                    id="send-button"
                    class="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition duration-200 font-semibold disabled:bg-blue-400 disabled:cursor-not-allowed"
                >
                    إرسال
                </button>
            </form>
            <div id="error-message" class="text-red-500 text-sm mt-2 hidden text-center"></div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
