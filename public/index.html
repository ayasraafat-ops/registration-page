<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع ذكاء اصطناعي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom styles for loading indicator */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-100 flex flex-col h-screen">

    <header class="bg-blue-600 text-white py-4 shadow-md text-center">
        <h1 class="text-2xl font-bold">مساعد الذكاء الاصطناعي</h1>
    </header>

    <main class="flex-grow p-4 flex flex-col overflow-hidden max-w-4xl mx-auto w-full">
        <!-- Chat Area -->
        <div id="chat-container" class="flex-grow bg-white rounded-lg shadow-inner p-4 overflow-y-auto mb-4 flex flex-col gap-4">
            <!-- Messages will be appended here -->
            <div class="flex justify-start">
                <div class="bg-gray-200 text-gray-800 rounded-lg p-3 max-w-[80%] whitespace-pre-wrap">مرحباً! كيف يمكنني مساعدتك اليوم؟</div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="bg-white p-3 rounded-lg shadow-md flex gap-2">
            <input type="text" id="user-input" class="flex-grow border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="اكتب رسالتك هنا..." />
            <button id="send-btn" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition duration-200">إرسال</button>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
