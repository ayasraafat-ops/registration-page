<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع ذكاء اصطناعي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom styles for chat scroll area */
        #chat-box {
            scrollbar-width: thin;
        }
        #chat-box::-webkit-scrollbar {
            width: 8px;
        }
        #chat-box::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        #chat-box::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        #chat-box::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="bg-gray-100 h-screen flex flex-col font-sans">

    <!-- Header -->
    <header class="bg-blue-600 text-white p-4 shadow-md text-center">
        <h1 class="text-2xl font-bold">مساعد الذكاء الاصطناعي (Qwen)</h1>
    </header>

    <!-- Chat Container -->
    <main class="flex-grow flex flex-col max-w-4xl w-full mx-auto p-4 bg-white shadow-lg overflow-hidden my-4 rounded-lg">

        <!-- Chat Messages -->
        <div id="chat-box" class="flex-grow overflow-y-auto p-4 space-y-4 flex flex-col">
            <!-- Messages will be injected here by script.js -->
            <div class="flex justify-start w-full">
                <div class="bg-gray-200 text-gray-800 rounded-lg py-2 px-4 max-w-[80%] shadow-sm">
                    مرحباً! كيف يمكنني مساعدتك اليوم؟
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="border-t pt-4 flex gap-2">
            <input type="text" id="message-input" class="flex-grow border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="اكتب رسالتك هنا..." onkeypress="handleKeyPress(event)">
            <button id="send-button" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-semibold transition duration-200 focus:outline-none focus:ring-2 focus:ring-blue-500" onclick="sendMessage()">
                إرسال
            </button>
        </div>
    </main>

    <!-- Footer -->
    <footer class="text-center p-2 text-gray-500 text-sm">
        بدعم من OpenRouter ونموذج Qwen
    </footer>

    <script src="/script.js"></script>
</body>
</html>
