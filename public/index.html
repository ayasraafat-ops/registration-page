<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع ذكاء اصطناعي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Custom scrollbar for better look */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .message-content {
            white-space: pre-wrap;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-blue-600 text-white p-4 shadow-md flex justify-between items-center">
        <h1 class="text-xl font-bold"><i class="fas fa-robot mr-2 ml-2"></i>المساعد الذكي (Qwen Plus)</h1>
    </header>

    <!-- Chat Container -->
    <main class="flex-1 overflow-y-auto p-4 w-full max-w-4xl mx-auto" id="chat-container">
        <!-- Initial Welcome Message -->
        <div class="flex justify-start mb-4">
            <div class="bg-white text-gray-800 p-3 rounded-lg rounded-tr-none shadow max-w-3xl">
                <p class="message-content">أهلاً بك! أنا مساعدك الذكي. كيف يمكنني مساعدتك اليوم؟</p>
            </div>
        </div>
    </main>

    <!-- Input Area -->
    <footer class="bg-white p-4 shadow-[0_-2px_10px_rgba(0,0,0,0.1)]">
        <div class="w-full max-w-4xl mx-auto flex gap-2">
            <textarea
                id="message-input"
                rows="1"
                class="flex-1 border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none overflow-hidden"
                placeholder="اكتب رسالتك هنا... (اضغط Enter للإرسال)"
            ></textarea>
            <button
                id="send-button"
                class="bg-blue-600 hover:bg-blue-700 text-white rounded-lg px-6 py-2 transition-colors duration-200 flex items-center justify-center"
            >
                <i class="fas fa-paper-plane mr-2 ml-2"></i> إرسال
            </button>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
