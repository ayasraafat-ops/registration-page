<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع ذكاء اصطناعي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #f3f4f6;
        }
    </style>
</head>
<body class="flex flex-col h-screen">
    <header class="bg-blue-600 text-white p-4 shadow-md">
        <h1 class="text-2xl font-bold text-center">مساعد الذكاء الاصطناعي (Qwen 3.6 Plus)</h1>
    </header>

    <main class="flex-1 overflow-y-auto p-4 max-w-4xl w-full mx-auto" id="chat-container">
        <!-- Messages will appear here -->
        <div class="mb-4">
            <div class="bg-white text-gray-800 p-4 rounded-lg shadow inline-block max-w-[80%]">
                مرحباً! كيف يمكنني مساعدتك اليوم؟
            </div>
        </div>
    </main>

    <footer class="bg-white p-4 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)] border-t">
        <div class="max-w-4xl mx-auto flex gap-2">
            <input type="text" id="user-input" class="flex-1 border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="اكتب رسالتك هنا..." onkeypress="handleKeyPress(event)">
            <button id="send-btn" class="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition font-bold" onclick="sendMessage()">إرسال</button>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
