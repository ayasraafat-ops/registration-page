<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع ذكاء اصطناعي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
    </style>
</head>
<body class="bg-gray-100 h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-blue-600 text-white p-4 shadow-md flex justify-between items-center">
        <h1 class="text-2xl font-bold"><i class="fa-solid fa-robot ml-2"></i>مساعد الذكاء الاصطناعي</h1>
        <span class="text-sm bg-blue-700 px-2 py-1 rounded">Qwen 3.6 Plus</span>
    </header>

    <!-- Chat Container -->
    <main class="flex-1 overflow-y-auto p-4 flex flex-col gap-4" id="chat-container">
        <!-- Messages will be added here -->
        <div class="flex justify-start w-full">
            <div class="bg-white text-gray-800 p-3 rounded-lg shadow max-w-3/4 rounded-tr-none">
                أهلاً بك! أنا مساعد ذكي، كيف يمكنني مساعدتك اليوم؟
            </div>
        </div>
    </main>

    <!-- Input Area -->
    <footer class="bg-white p-4 shadow-[0_-2px_10px_rgba(0,0,0,0.05)] border-t border-gray-200">
        <form id="chat-form" class="flex gap-2 max-w-4xl mx-auto">
            <input type="text" id="user-input" class="flex-1 border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="اكتب رسالتك هنا..." required>
            <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition flex items-center gap-2" id="send-button">
                <span>إرسال</span>
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </form>
    </footer>

    <script src="script.js"></script>
</body>
</html>
