<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع ذكاء اصطناعي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
    </style>
</head>
<body class="bg-gray-100 h-screen flex flex-col">
    <header class="bg-blue-600 text-white p-4 shadow-md text-center">
        <h1 class="text-2xl font-bold">مساعد الذكاء الاصطناعي</h1>
    </header>

    <main class="flex-grow flex flex-col max-w-4xl w-full mx-auto p-4 sm:p-6 overflow-hidden">
        <div id="chat-container" class="flex-grow bg-white rounded-lg shadow-sm border border-gray-200 overflow-y-auto p-4 mb-4 flex flex-col gap-4">
            <!-- Messages will appear here -->
        </div>

        <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-2 sm:p-4 flex gap-2">
            <textarea id="message-input" rows="1" class="flex-grow resize-none border border-gray-300 rounded-md p-2 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="اكتب رسالتك هنا..."></textarea>
            <button id="send-button" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-md transition duration-200 flex-shrink-0">
                إرسال
            </button>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
