<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع ذكاء اصطناعي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom styles if needed, mostly using Tailwind */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    </style>
</head>
<body class="bg-gray-100 h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-blue-600 text-white p-4 shadow-md flex justify-between items-center">
        <h1 class="text-xl font-bold">مساعد الذكاء الاصطناعي (Qwen)</h1>
    </header>

    <!-- Chat Area -->
    <main class="flex-1 overflow-y-auto p-4 flex flex-col gap-4" id="chat-container">
        <!-- Messages will appear here -->
        <div class="flex justify-start">
            <div class="bg-white text-gray-800 p-3 rounded-lg max-w-3xl shadow">
                مرحباً! كيف يمكنني مساعدتك اليوم؟
            </div>
        </div>
    </main>

    <!-- Input Area -->
    <footer class="bg-white p-4 shadow-inner flex gap-2 items-center border-t border-gray-200">
        <textarea id="user-input" class="flex-1 p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none h-12" placeholder="اكتب رسالتك هنا..." rows="1"></textarea>
        <button id="send-button" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg font-bold transition-colors shadow">إرسال</button>
    </footer>

    <script src="/script.js"></script>
</body>
</html>
