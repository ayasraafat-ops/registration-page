<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مساعد الذكاء الاصطناعي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
    </style>
</head>
<body class="bg-gray-100 flex flex-col h-screen">

    <header class="bg-blue-600 text-white p-4 shadow-md text-center">
        <h1 class="text-2xl font-bold">مساعد الذكاء الاصطناعي (Qwen)</h1>
    </header>

    <main class="flex-1 overflow-y-auto p-4" id="chat-container">
        <!-- Messages will be appended here -->
    </main>

    <footer class="bg-white p-4 shadow-inner">
        <form id="chat-form" class="flex gap-2 max-w-4xl mx-auto">
            <input type="text" id="message-input" autocomplete="off" class="flex-1 p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="اكتب رسالتك هنا..." required>
            <button type="submit" class="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 font-semibold transition-colors disabled:opacity-50">إرسال</button>
        </form>
    </footer>

    <script src="/script.js"></script>
</body>
</html>
