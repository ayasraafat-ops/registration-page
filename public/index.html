<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المساعد الذكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar for webkit */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
        .message-content {
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .loading-dots::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }
        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col font-sans">

    <!-- Header -->
    <header class="bg-blue-600 text-white p-4 shadow-md">
        <div class="container mx-auto max-w-4xl flex items-center justify-between">
            <h1 class="text-2xl font-bold">المساعد الذكي (Qwen)</h1>
            <div class="text-sm opacity-80">مدعوم بتقنية الذكاء الاصطناعي</div>
        </div>
    </header>

    <!-- Main Chat Area -->
    <main class="flex-grow container mx-auto max-w-4xl p-4 flex flex-col h-[calc(100vh-140px)]">
        <!-- Chat Container -->
        <div id="chat-container" class="flex-grow bg-white rounded-lg shadow-md p-4 mb-4 overflow-y-auto flex flex-col space-y-4">
            <!-- Welcome Message -->
            <div class="flex justify-start">
                <div class="bg-blue-100 text-blue-900 rounded-lg rounded-tr-none px-4 py-2 max-w-[80%] shadow-sm">
                    <p class="message-content">مرحباً! أنا المساعد الذكي. كيف يمكنني مساعدتك اليوم؟</p>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="bg-white rounded-lg shadow-md p-3 flex gap-2">
            <input
                type="text"
                id="user-input"
                class="flex-grow border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-shadow"
                placeholder="اكتب رسالتك هنا..."
                autocomplete="off"
            >
            <button
                id="send-button"
                class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center min-w-[80px]"
            >
                إرسال
            </button>
        </div>

        <!-- Error Container (Hidden by default) -->
        <div id="error-container" class="hidden mt-2 text-red-600 text-sm text-center font-medium bg-red-100 p-2 rounded">
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
