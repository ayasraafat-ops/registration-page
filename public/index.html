<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع ذكاء اصطناعي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar for better appearance */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-blue-600 text-white p-4 shadow-md text-center">
        <h1 class="text-2xl font-bold">موقع ذكاء اصطناعي (Qwen 3.6 Plus)</h1>
    </header>

    <!-- Chat Container -->
    <main class="flex-grow p-4 overflow-hidden flex flex-col max-w-4xl mx-auto w-full">
        <!-- Messages Area -->
        <div id="chat-box" class="flex-grow bg-white rounded-lg shadow-md p-4 overflow-y-auto mb-4 flex flex-col gap-4">
            <!-- Initial Assistant Message -->
            <div class="flex justify-start">
                <div class="bg-gray-200 text-gray-800 rounded-lg p-3 max-w-[80%] shadow-sm">
                    <p class="whitespace-pre-wrap">مرحباً! كيف يمكنني مساعدتك اليوم؟</p>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="bg-white rounded-lg shadow-md p-3 flex gap-2">
            <textarea id="user-input" class="flex-grow border border-gray-300 rounded-lg p-2 focus:outline-none focus:border-blue-500 resize-none" rows="2" placeholder="اكتب رسالتك هنا..."></textarea>
            <button id="send-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-lg transition duration-200 flex items-center justify-center">
                إرسال
            </button>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-200 text-center p-2 text-sm text-gray-600">
        بدعم من OpenRouter ونموذج Qwen
    </footer>

    <script src="script.js"></script>
</body>
</html>
