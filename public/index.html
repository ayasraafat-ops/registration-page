<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع ذكاء اصطناعي - Qwen 3.6 Plus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom styles if needed */
        .message-content {
            white-space: pre-wrap;
        }
    </style>
</head>
<body class="bg-gray-100 h-screen flex flex-col font-sans">
    <!-- Header -->
    <header class="bg-blue-600 text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold">مساعد الذكاء الاصطناعي (Qwen)</h1>
        </div>
    </header>

    <!-- Chat Container -->
    <main class="flex-1 container mx-auto max-w-4xl p-4 flex flex-col bg-white shadow-lg my-4 rounded-lg overflow-hidden">
        <!-- Messages Area -->
        <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-4">
            <!-- Initial Greeting -->
            <div class="flex justify-start">
                <div class="bg-gray-200 text-gray-800 p-3 rounded-lg max-w-[80%] shadow">
                    <p class="message-content">مرحباً! أنا مساعد ذكاء اصطناعي مدعوم بنموذج Qwen 3.6 Plus. كيف يمكنني مساعدتك اليوم؟</p>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="border-t p-4 bg-gray-50 flex items-end gap-2">
            <textarea id="user-input" rows="1" class="flex-1 p-3 border rounded-lg resize-none focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm" placeholder="اكتب رسالتك هنا..."></textarea>
            <button id="send-btn" class="bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-lg transition duration-200 shadow disabled:opacity-50">
                إرسال
            </button>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
