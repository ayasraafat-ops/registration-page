<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع ذكاء اصطناعي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar for better appearance */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>
<body class="bg-gray-100 h-screen flex flex-col font-sans">

    <header class="bg-blue-600 text-white p-4 shadow-md text-center">
        <h1 class="text-2xl font-bold">مساعد الذكاء الاصطناعي</h1>
    </header>

    <main class="flex-1 overflow-y-auto p-4 flex flex-col items-center">
        <div id="chat-container" class="w-full max-w-3xl flex flex-col gap-4">
            <!-- Messages will appear here -->
            <div class="flex justify-start">
                <div class="bg-white rounded-lg p-3 shadow-md max-w-[80%] text-gray-800">
                    مرحباً بك! أنا مساعد ذكي هنا للإجابة على أسئلتك. كيف يمكنني مساعدتك اليوم؟
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-white p-4 shadow-[0_-2px_10px_rgba(0,0,0,0.05)] border-t border-gray-200">
        <div class="w-full max-w-3xl mx-auto flex gap-2">
            <input type="text" id="user-input" class="flex-1 border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500" placeholder="اكتب رسالتك هنا..." onkeydown="handleKeyDown(event)">
            <button id="send-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-6 rounded-lg transition duration-200" onclick="sendMessage()">إرسال</button>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
