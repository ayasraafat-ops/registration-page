<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع ذكاء اصطناعي - Qwen 3.6 Plus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #f3f4f6;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="h-screen flex flex-col">
    <!-- Header -->
    <header class="bg-blue-600 text-white shadow-md p-4 flex justify-between items-center z-10">
        <div>
            <h1 class="text-2xl font-bold">مساعد الذكاء الاصطناعي</h1>
            <p class="text-sm opacity-80">مدعوم بنموذج Qwen 3.6 Plus</p>
        </div>
    </header>

    <!-- Chat Container -->
    <main class="flex-1 overflow-y-auto p-4 sm:p-6 w-full max-w-4xl mx-auto" id="chat-container">
        <!-- Messages will be injected here -->
        <div class="flex justify-start mb-4">
            <div class="bg-white text-gray-800 rounded-2xl rounded-tr-none px-5 py-3 shadow-sm max-w-[85%] border border-gray-100">
                <p class="whitespace-pre-wrap">مرحباً! أنا مساعدك الذكي المعتمد على تقنية Qwen. كيف يمكنني مساعدتك اليوم؟</p>
            </div>
        </div>
    </main>

    <!-- Input Area -->
    <footer class="bg-white border-t border-gray-200 p-4 w-full">
        <div class="max-w-4xl mx-auto">
            <form id="chat-form" class="flex gap-2">
                <input
                    type="text"
                    id="message-input"
                    class="flex-1 border border-gray-300 rounded-full px-6 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                    placeholder="اكتب رسالتك هنا..."
                    autocomplete="off"
                    required
                >
                <button
                    type="submit"
                    id="send-button"
                    class="bg-blue-600 text-white rounded-full px-6 py-3 font-medium hover:bg-blue-700 transition duration-200 flex items-center justify-center min-w-[100px]"
                >
                    <span>إرسال</span>
                </button>
            </form>
        </div>
    </footer>

    <script src="/script.js"></script>
</body>
</html>
