<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع ذكاء اصطناعي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Extra styles if needed */
        #chat-container::-webkit-scrollbar {
            width: 6px;
        }
        #chat-container::-webkit-scrollbar-thumb {
            background-color: rgba(156, 163, 175, 0.5);
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-gray-100 h-screen flex flex-col items-center justify-center">

    <div class="w-full max-w-2xl h-[90vh] bg-white rounded-lg shadow-lg flex flex-col overflow-hidden">

        <!-- Header -->
        <div class="bg-blue-600 text-white p-4 text-center font-bold text-xl">
            مساعد الذكاء الاصطناعي (Qwen 3.6 Plus)
        </div>

        <!-- Chat Area -->
        <div id="chat-container" class="flex-1 p-4 overflow-y-auto flex flex-col space-y-4 bg-gray-50">
            <!-- Messages will be appended here -->
            <div class="flex justify-start w-full">
                <div class="bg-gray-200 text-gray-800 rounded-lg p-3 max-w-[80%] shadow-sm" style="white-space: pre-wrap;">مرحباً! كيف يمكنني مساعدتك اليوم؟</div>
            </div>
        </div>

        <!-- Input Area -->
        <form id="chat-form" class="p-4 bg-white border-t border-gray-200 flex space-x-2 space-x-reverse">
            <input type="text" id="message-input" required placeholder="اكتب رسالتك هنا..."
                   class="flex-1 border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <button type="submit"
                    class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-lg transition duration-200">
                إرسال
            </button>
        </form>

    </div>

    <script src="/script.js"></script>
</body>
</html>
