<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع ذكاء اصطناعي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .message-content {
            white-space: pre-wrap;
        }
    </style>
</head>
<body class="bg-gray-100 flex flex-col h-screen font-sans">
    <header class="bg-blue-600 text-white p-4 shadow-md text-center">
        <h1 class="text-2xl font-bold">مساعد الذكاء الاصطناعي (Qwen 3.6 Plus)</h1>
    </header>

    <main class="flex-1 overflow-y-auto p-4 w-full max-w-4xl mx-auto" id="chat-container">
        <!-- Messages will appear here -->
        <div class="mb-4">
            <div class="bg-white text-gray-800 p-3 rounded-lg shadow inline-block max-w-[80%]">
                مرحباً! كيف يمكنني مساعدتك اليوم؟
            </div>
        </div>
    </main>

    <footer class="bg-white p-4 shadow-md mt-auto">
        <div class="max-w-4xl mx-auto flex gap-2">
            <input type="text" id="user-input" class="flex-1 border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="اكتب رسالتك هنا...">
            <button id="send-btn" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition duration-200">إرسال</button>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
