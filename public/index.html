<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع الذكاء الاصطناعي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f3f4f6;
        }
        .message-content {
            white-space: pre-wrap;
        }
    </style>
</head>
<body class="flex flex-col h-screen">
    <!-- Header -->
    <header class="bg-blue-600 text-white shadow-md p-4 flex justify-between items-center">
        <h1 class="text-xl font-bold">موقع الذكاء الاصطناعي (Qwen-Plus)</h1>
    </header>

    <!-- Chat Container -->
    <main class="flex-1 overflow-y-auto p-4 max-w-4xl w-full mx-auto" id="chat-container">
        <!-- Initial Welcome Message -->
        <div class="flex justify-start mb-4">
            <div class="bg-white text-gray-800 p-4 rounded-lg shadow-sm max-w-3xl border border-gray-200">
                <p class="message-content">مرحباً! أنا المساعد الذكي. كيف يمكنني مساعدتك اليوم؟</p>
            </div>
        </div>
    </main>

    <!-- Input Area -->
    <footer class="bg-white p-4 shadow-[0_-2px_10px_rgba(0,0,0,0.1)]">
        <div class="max-w-4xl mx-auto flex items-end space-x-2 space-x-reverse">
            <div class="flex-1">
                <textarea
                    id="user-input"
                    class="w-full border border-gray-300 rounded-lg p-3 resize-none focus:outline-none focus:ring-2 focus:ring-blue-500 min-h-[50px] max-h-[150px]"
                    rows="1"
                    placeholder="اكتب رسالتك هنا..."></textarea>
            </div>
            <button id="send-button" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg font-semibold transition-colors duration-200 flex-shrink-0">
                إرسال
            </button>
        </div>
        <!-- Error Message Container -->
        <div id="error-container" class="max-w-4xl mx-auto mt-2 text-red-600 text-sm hidden font-semibold"></div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
