<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع ذكاء اصطناعي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar for chat area */
        .chat-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .chat-scroll::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-scroll::-webkit-scrollbar-thumb {
            background-color: #CBD5E1;
            border-radius: 20px;
        }
    </style>
</head>
<body class="bg-gray-100 h-screen flex flex-col font-sans">
    <!-- Header -->
    <header class="bg-blue-600 text-white p-4 shadow-md flex justify-between items-center">
        <h1 class="text-2xl font-bold">مساعد الذكاء الاصطناعي (Qwen 3.6 Plus)</h1>
    </header>

    <!-- Chat Area -->
    <main class="flex-1 overflow-y-auto p-4 chat-scroll flex flex-col gap-4" id="chat-container">
        <!-- Initial Message -->
        <div class="flex justify-start">
            <div class="bg-white text-gray-800 p-4 rounded-xl rounded-tr-none shadow max-w-[80%]">
                <p>مرحباً! أنا مساعدك الذكي المعتمد على نموذج Qwen 3.6 Plus. كيف يمكنني مساعدتك اليوم؟</p>
            </div>
        </div>
    </main>

    <!-- Input Area -->
    <footer class="bg-white p-4 border-t">
        <form id="chat-form" class="flex gap-2 max-w-4xl mx-auto">
            <input type="text" id="user-input" class="flex-1 border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="اكتب رسالتك هنا..." required autocomplete="off">
            <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500 disabled:opacity-50 disabled:cursor-not-allowed" id="send-button">
                إرسال
            </button>
        </form>
    </footer>

    <script src="script.js"></script>
</body>
</html>
