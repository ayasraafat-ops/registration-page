<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع ذكاء اصطناعي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .whitespace-pre-wrap { white-space: pre-wrap; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col font-sans text-gray-800">
    <!-- Header -->
    <header class="bg-blue-600 text-white p-4 shadow-md text-center">
        <h1 class="text-2xl font-bold">مساعد الذكاء الاصطناعي (Qwen)</h1>
        <p class="text-sm mt-1">مدعوم بأحدث التقنيات</p>
    </header>

    <!-- Main Content: Chat Interface -->
    <main class="flex-grow max-w-4xl w-full mx-auto p-4 flex flex-col mt-4 mb-4">
        <div class="bg-white rounded-lg shadow-lg flex-grow flex flex-col overflow-hidden">
            <!-- Chat History -->
            <div id="chat-box" class="flex-grow p-4 overflow-y-auto space-y-4">
                <!-- Example welcome message -->
                <div class="flex items-start">
                    <div class="bg-blue-100 text-blue-900 rounded-lg p-3 max-w-[80%]">
                        <p class="whitespace-pre-wrap">مرحباً! أنا مساعدك الذكي. كيف يمكنني مساعدتك اليوم؟</p>
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="border-t p-4 bg-gray-50 flex items-center space-x-2 space-x-reverse">
                <textarea id="user-input" rows="1" placeholder="اكتب رسالتك هنا..."
                    class="flex-grow p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none overflow-hidden"
                    style="min-height: 48px;"></textarea>
                <button id="send-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg font-bold transition duration-200 flex-shrink-0 flex items-center justify-center">
                    <span id="btn-text">إرسال</span>
                    <svg id="btn-loader" class="animate-spin -ml-1 mr-3 h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </button>
            </div>
        </div>
    </main>

    <footer class="text-center p-4 text-gray-500 text-sm">
        &copy; 2024 تطبيق الذكاء الاصطناعي
    </footer>

    <script src="script.js"></script>
</body>
</html>
